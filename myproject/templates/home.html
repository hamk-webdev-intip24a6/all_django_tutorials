{% extends 'base.html' %}
{% block content %}
<h1>Home</h1>
{% if user.is_authenticated %}
    <p>User logged in: {{ user }}</p>
    <form method="post" action="{% url 'logout' %}">
        {% csrf_token %}
    <button type="submit">Log out</button>
    </form>
{% else %}
    <p>You must login first.</p>
    <p><a href="{% url 'login' %}">Login</a></p>
    <p><a href="{% url 'signup' %}">Create a new Account</a></p>
{% endif %}
<h2>Apps Gallery </h2>
<ul>
    <li><a href="{% url 'dictionary:index' %}">Dictionary</a></li>
    <li><a href="{% url 'guestbook:index' %}">Guestbook</a></li>
    <li><a href="{% url 'hello:index' %}">Hello</a></li>
</ul>
<p>Here is more text...</p>
{% endblock %}
